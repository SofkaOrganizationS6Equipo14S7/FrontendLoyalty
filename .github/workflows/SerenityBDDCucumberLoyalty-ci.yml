name: Serenity BDD CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  serenity-tests:
    name: Serenity BDD Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Serenity BDD tests
        uses: actions/checkout@v4
        with:
          repository: SofkaOrganizationS6Equipo14S7/SerenityBDDCucumberLoyalty
          ref: main

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run Serenity BDD tests (headless)
        run: ./gradlew clean test aggregate
        env:
          JAVA_TOOL_OPTIONS: "-Dheadless.mode=true -Dchrome.switches=--headless=new,--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--window-size=1920,1080"

      - name: Upload Serenity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity/
          retention-days: 14

      - name: Publish Serenity report summary
        if: always()
        run: |
          echo "## Serenity BDD Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f target/site/serenity/serenity-summary.html ]; then
            echo "Serenity report generated successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Serenity report was not generated." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the full report from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
